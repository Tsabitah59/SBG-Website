<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallax JS</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
body {
    margin: 0;
    padding: 0;
}

section {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    background-color: #333;
    color: white;
}

/* Container wajib menggunakan overflow hidden */
.parallax-container {
    position: relative;
    overflow: hidden; /* Menyembunyikan gambar yang keluar batas */
    background-color: #000;
}

/* Bagian gambar */
.parallax-img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 120%; /* Lebih tinggi dari container agar tidak kosong saat digerakkan */
    z-index: 1;
    will-change: transform; /* Optimasi performa browser */
}

.parallax-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

.overlay-text {
    position: relative;
    z-index: 2; /* Agar teks berada di atas gambar */
}
</style>
<body>

    <section class="normal">
        <h1>Konten Pertama</h1>
    </section>

    <!-- Container untuk efek paralaks -->
    <section class="parallax-container">
        <!-- Gambar dengan atribut data-speed untuk mengatur kecepatan -->
        <div class="parallax-img" data-speed="0.5">
            <img src="https://source.unsplash.com/random/1920x1080/?mountains" alt="Background">
        </div>
        <div class="overlay-text">
            <h2>Efek Paralaks JS</h2>
        </div>
    </section>

    <section class="normal">
        <h1>Konten Bawah</h1>
    </section>

    <script>
      const parallaxImages = document.querySelectorAll('.parallax-img');

window.addEventListener('scroll', () => {
    // Dapatkan posisi scroll saat ini
    const scrollY = window.scrollY;

    // Loop melalui setiap elemen paralaks
    parallaxImages.forEach(img => {
        // Dapatkan kecepatan dari attribute data-speed
        // Jika tidak ada, default 0.5
        const speed = img.getAttribute('data-speed') || 0.5;

        // Hitung offset
        // Kita perlu menghitung posisi elemen relatif terhadap viewport
        const container = img.parentElement;
        const containerTop = container.offsetTop;
        const containerHeight = container.offsetHeight;

        // Cek apakah elemen sedang terlihat di layar
        if (scrollY + window.innerHeight > containerTop && scrollY < containerTop + containerHeight) {
            // Rumus: (Posisi Scroll Global - Posisi Atas Container) * Kecepatan
            const yPos = (scrollY - containerTop) * speed;
            
            // Gunakan translate3d untuk akselerasi hardware (lebih halus)
            img.style.transform = `translate3d(0, ${yPos}px, 0)`;
        }
    });
});
    </script>
</body>
</html>
