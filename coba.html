<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<style>
  body {
  margin: 0;
  font-family: sans-serif;
}

section {
  width: 100%;
  height: 300vh;
  color: blanchedalmond;
}

/* SECTION TINGGI BUAT SCROLL */
.advantages-section {
  height: 300vh;
  position: relative;
}

/* STICKY AREA */
.sticky-wrapper {
  position: sticky;
  top: 0;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* HEADER */
.section-header {
  text-align: center;
  margin-bottom: 40px;
  z-index: 2;
}

/* CARD CONTAINER */
.cards-container {
  display: flex;
  gap: 20px;
  padding: 0 10vw;
  transition: transform 0.1s ease-out;
}

/* CARD */
.card {
  min-width: 300px;
  height: 200px;
  background: #4f46e5;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 16px;
  font-size: 20px;
  flex-shrink: 0;
}
</style>
<body>
  <section></section>
  <section class="advantages-section">

    <div class="sticky-wrapper">

      <!-- JUDUL (TIDAK IKUT GESER) -->
      <div class="section-header">
        <h2>Keunggulan Kami</h2>
        <p>Kenapa memilih kami dibanding yang lain</p>
      </div>

      <!-- CARD (YANG GESER) -->
      <div class="cards-container">
        <div class="card">Keunggulan 1</div>
        <div class="card">Keunggulan 2</div>
        <div class="card">Keunggulan 3</div>
        <div class="card">Keunggulan 4</div>
        <div class="card">Keunggulan 5</div>
      </div>

    </div>

  </section>
<section></section>

<script>
  const section = document.querySelector('.advantages-section');
const container = document.querySelector('.cards-container');

window.addEventListener('scroll', () => {
  const sectionTop = section.offsetTop;
  const scrollY = window.scrollY;
  
  const sectionHeight = section.offsetHeight;
  const windowHeight = window.innerHeight;

  const scrollProgress = (scrollY - sectionTop) / (sectionHeight - windowHeight);

  const maxTranslate = container.scrollWidth - window.innerWidth;

  if (scrollProgress >= 0 && scrollProgress <= 1) {
    container.style.transform = `translateX(-${scrollProgress * maxTranslate}px)`;
  }
});
</script>
</body>
</html>
