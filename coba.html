<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Contoh Anime.js CDN</title>
</head>
<body>
    <div class="large centered row">
        <p id="text" class="text-xl">Split text by words.<br>単語ごとに分割します。</p>
      </div>
      <div class="small row"></div>

    </script>
    <script type="module">
import { animate, splitText, stagger } from 'https://esm.sh/animejs';

const { words } = splitText('#text', {
  words: { wrap: 'clip' },
})

animate(words, {
  y: [
    { to: ['100%', '0%'] },
  ],
  duration: 750,
  ease: 'out(3)',
  delay: stagger(100),
  loop: true,
});
    </script>
</body>
</html>
