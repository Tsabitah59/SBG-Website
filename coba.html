<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<style>

* {
  margin: 0;
  padding: 0;
}

section {
  height: 100svh;
}

.sec0 {
  background: rgb(39, 204, 255);
}

.sec1 {
  background: rgb(18, 131, 229);
  display: grid;
  place-items: center;
  position: relative;
}

.sec2 {
  background: rgb(20, 88, 189);
}

.sec3 {
  background: rgb(14, 26, 158);
}

.sec4 {
  background: rgb(79, 16, 168);
}

div {
  font-size: 100px;
  background: violet;
  padding: 40px;
  position: sticky;
}

</style>
<body>
  <section class="sec0"></section>
  <section class="sec1">
    <div>Hello</div>
  </section>
  <section class="sec2"></section>
  <section class="sec3"></section>
  <section class="sec4"></section>
</body>
</html>
